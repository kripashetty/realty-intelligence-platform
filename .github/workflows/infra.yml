name: Infrastructure

# Triggers:
#   - Auto: push to main when Bicep files change
#   - Manual: workflow_dispatch to target dev or prod
on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  ENVIRONMENT: ${{ inputs.environment || 'dev' }}

jobs:
  provision:
    name: Provision — ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.bicep.outputs.backend_url }}
      postgres_fqdn: ${{ steps.bicep.outputs.postgres_fqdn }}
      postgres_server_name: ${{ steps.names.outputs.postgres_server_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Derive resource names
        id: names
        run: |
          ENV="${{ env.ENVIRONMENT }}"
          echo "postgres_server_name=realty-${ENV}-pg" >> "$GITHUB_OUTPUT"

      - name: Create resource group
        run: |
          az group create \
            --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Create Container Registry
        id: acr
        run: |
          # az acr create is idempotent — safe to run on every deploy
          az acr create \
            --name "${{ vars.ACR_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --sku Basic \
            --admin-enabled true

          LOGIN_SERVER=$(az acr show \
            --name "${{ vars.ACR_NAME }}" \
            --query loginServer -o tsv)

          ACR_PWD=$(az acr credential show \
            --name "${{ vars.ACR_NAME }}" \
            --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PWD"

          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "password=$ACR_PWD" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep
        id: bicep
        run: |
          RESULT=$(az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters \
              environment="${{ env.ENVIRONMENT }}" \
              postgresAdminLogin="${{ secrets.POSTGRES_ADMIN_LOGIN }}" \
              postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              acrLoginServer="${{ steps.acr.outputs.login_server }}" \
              acrUsername="${{ vars.ACR_NAME }}" \
              acrPassword="${{ steps.acr.outputs.password }}" \
            --query "properties.outputs" \
            --output json)

          BACKEND_URL=$(echo "$RESULT" | jq -r '.backendUrl.value')
          POSTGRES_FQDN=$(echo "$RESULT" | jq -r '.postgresServerFqdn.value')

          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "postgres_fqdn=$POSTGRES_FQDN" >> "$GITHUB_OUTPUT"

          {
            echo "## Infrastructure provisioned"
            echo "| | |"
            echo "|---|---|"
            echo "| Environment | \`${{ env.ENVIRONMENT }}\` |"
            echo "| Backend URL | $BACKEND_URL |"
            echo "| ACR | ${{ steps.acr.outputs.login_server }} |"
            echo "| Postgres FQDN | $POSTGRES_FQDN |"
          } >> "$GITHUB_STEP_SUMMARY"

  migrate:
    name: Run database migrations
    needs: provision
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Allow runner IP in PostgreSQL firewall
        id: firewall
        run: |
          RUNNER_IP=$(curl -sf https://api.ipify.org)
          RULE_NAME="github-runner-${{ github.run_id }}"
          az postgres flexible-server firewall-rule create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ needs.provision.outputs.postgres_server_name }}" \
            --rule-name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
          echo "rule_name=$RULE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install backend dependencies
        working-directory: backend
        run: uv pip install -e "." --system

      - name: Run Alembic migrations
        working-directory: backend
        env:
          # Construct URL from parts — secrets are masked automatically in logs
          DATABASE_URL: "postgresql+asyncpg://${{ secrets.POSTGRES_ADMIN_LOGIN }}:${{ secrets.POSTGRES_ADMIN_PASSWORD }}@${{ needs.provision.outputs.postgres_fqdn }}:5432/realty?ssl=require"
        run: uv run alembic upgrade head

      - name: Remove runner IP from PostgreSQL firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ needs.provision.outputs.postgres_server_name }}" \
            --rule-name "${{ steps.firewall.outputs.rule_name }}" \
            --yes
