services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realty}
      POSTGRES_USER: ${POSTGRES_USER:-realty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realty}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realty} -d ${POSTGRES_DB:-realty}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-realty}:${POSTGRES_PASSWORD:-realty}@db:5432/${POSTGRES_DB:-realty}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

volumes:
  postgres_data:
  ollama_data:
